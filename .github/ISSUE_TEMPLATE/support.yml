name: Support request
description: Ask for help with setup or runtime behavior using sanitized data.
title: "[Support]: "
labels: ["support", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Support requests must use sanitized diagnostics. Do not paste access tokens, refresh tokens, house IDs, device IDs, MAC addresses, usernames, endpoint URLs, IP addresses tied to a user, or raw payloads.
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: home_assistant_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.6.0"
    validations:
      required: true
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Scan-login setup
        - Region or account selection
        - Device picker or import filter
        - WebSocket live updates
        - Local gateway opt-in
        - Analytics refresh
        - Registry cleanup dry-run
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you tried and what help you need.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics or verifier output
      description: Include aggregate diagnostics, local HA verifier output, or sanitized logs. Do not include raw identifiers or payloads.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I checked that diagnostics and logs do not contain tokens, house IDs, device IDs, MAC addresses, usernames, endpoint URLs, IP addresses tied to a user, or raw payloads.
          required: true
