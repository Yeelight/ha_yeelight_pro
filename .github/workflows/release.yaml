name: Release

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_test.txt

      - name: Run full release gate
        run: |
          python hacs_publish.py --check

      - name: Create and validate release zip
        run: |
          python scripts/check_release_zip.py --write yeelight_pro.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: yeelight_pro.zip
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
