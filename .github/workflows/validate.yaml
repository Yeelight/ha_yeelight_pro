name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  local-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_test.txt

      - name: Compile integration
        run: |
          python -m compileall -q custom_components/yeelight_pro scripts hacs_publish.py

      - name: Lint integration
        run: |
          ruff check custom_components/yeelight_pro scripts hacs_publish.py

      - name: Type-check integration
        run: |
          mypy --ignore-missing-imports --explicit-package-bases custom_components/yeelight_pro scripts hacs_publish.py

      - name: Run unit tests
        run: |
          python -m pytest -q

      - name: Validate metadata and release package shape
        run: |
          python validate_hacs.py
          python scripts/check_release_zip.py
