# Yeelight Pro 服务定义

assign_areas:
  name: 批量分配区域
  description: 批量为 HA 设备或实体对应的设备分配区域（管理员服务）
  fields:
    devices:
      name: 设备或实体列表
      description: 要分配区域的 HA 设备注册表 ID 或实体 ID 列表
      required: true
      example: '["light.living_room_1", "light.living_room_2"]'
      selector:
        object:
    area_id:
      name: 区域 ID
      description: 目标区域的 ID
      required: true
      example: "living_room"
      selector:
        area:

auto_assign_areas:
  name: 自动分配区域
  description: 根据设备名称中的房间关键词自动分配区域（管理员服务）
  fields:
    gateway_id:
      name: 网关 ID
      description: 限定指定 HA 网关设备注册表 ID 下的子设备（可选，不填则处理所有 Yeelight Pro 设备）
      required: false
      example: "gateway_01"
      selector:
        text:

debug_emit_event:
  name: 调试事件发射
  description: 向 Home Assistant 事件总线发射调试 Yeelight Pro 设备事件（管理员服务，仅用于开发调试）
  fields:
    entry_id:
      name: 配置条目 ID
      description: 可选；限定指定 Yeelight Pro 配置条目，避免多中枢环境路由到非预期 entry
      required: false
      selector:
        text:
    source_device_id:
      name: 源设备 ID
      description: 发射事件的源设备标识
      required: true
      example: 12345
      selector:
        text:
    component_id:
      name: 组件 ID
      description: 事件关联的组件标识
      required: true
      example: "light"
      selector:
        text:
    event_type:
      name: 事件类型
      description: 自定义事件类型名称
      required: true
      example: "button_pressed"
      selector:
        text:
    event_attributes:
      name: 事件属性
      description: 附加事件属性（可选 JSON 对象）
      required: false
      example: '{"key": "value"}'
      selector:
        object:

debug_dump_push_health:
  name: 调试推送链路
  description: 向 Home Assistant 日志输出聚合后的 Yeelight Pro WebSocket 推送链路诊断（管理员服务，仅用于开发调试）
  fields:
    entry_id:
      name: 配置条目 ID
      description: 可选；限定指定 Yeelight Pro 配置条目，避免多中枢环境读取非预期 entry
      required: false
      selector:
        text:

debug_emit_push_payload:
  name: 调试推送属性
  description: 注入一条合成 Yeelight Pro 属性推送以验证实时刷新链路；不会控制真实设备（管理员服务，仅用于开发调试）
  fields:
    entry_id:
      name: 配置条目 ID
      description: 可选；限定指定 Yeelight Pro 配置条目，避免多中枢环境路由到非预期 entry
      required: false
      selector:
        text:
    source_device_id:
      name: 源设备 ID
      description: 可选；合成推送的源设备标识。不填时可通过实体 ID 解析
      required: false
      example: 12345
      selector:
        text:
    entity_id:
      name: 实体 ID
      description: 可选；从现有 Yeelight Pro 实体解析源设备 ID，便于在开发者工具中验证
      required: false
      selector:
        entity:
          integration: yeelight_pro
    node_type:
      name: 节点类型
      description: 开放平台节点类型；默认 2 表示设备
      required: false
      default: 2
      selector:
        number:
          min: 1
          max: 5
          mode: box
    payload_shape:
      name: 推送帧形态
      description: 选择合成标准 prop 帧或私有部署订阅快照状态帧，用于排查实时刷新链路
      required: false
      default: "prop"
      selector:
        select:
          options:
            - "prop"
            - "private_subscribe_snapshot"
    params:
      name: 属性参数
      description: '要注入到运行时状态的属性键值对象，例如 {"p": true}'
      required: true
      example: '{"p": true}'
      selector:
        object:

refresh:
  name: 手动刷新
  description: 立即刷新已加载的 Yeelight Pro 数据并同步设备/实体注册表（管理员服务）
  fields:
    entry_id:
      name: 配置条目 ID
      description: 可选；不填则刷新所有已加载的 Yeelight Pro 配置条目
      required: false
      selector:
        text:
    refresh_product_schemas:
      name: 重新获取产品物模型
      description: 强制重新获取当前设备使用的产品物模型；失败时继续回退已缓存物模型
      required: false
      default: false
      selector:
        boolean:

cleanup_registry:
  name: 注册表清理预检
  description: 对 stale Yeelight Pro 实体执行 dry-run；二次确认后通过 Home Assistant registry 禁用 stale entities（管理员服务）
  fields:
    entry_id:
      name: 配置条目 ID
      description: 可选；dry-run 不填则汇总所有已加载 entry，confirm 时必须指定目标 entry
      required: false
      selector:
        text:
    confirm:
      name: 确认执行
      description: 设为 true 时执行二次确认；必须同时提供 dry-run 返回的 audit_id
      required: false
      default: false
      selector:
        boolean:
    audit_id:
      name: 审计 ID
      description: dry-run 返回的审计 ID；confirm 时必须匹配当前 stale 结果
      required: false
      selector:
        text:
